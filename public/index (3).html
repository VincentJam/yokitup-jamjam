<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamjerk — Dashboard</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#FDFCF8;--surface:#fff;--border:#D3D1C7;--border2:#B4B2A9;
    --text:#2C2C2A;--muted:#888780;--light:#F1EFE8;
    --green:#3B6D11;--red:#A32D2D;--amber:#854F0B;
  }
  body{font-family:'Courier New',Courier,monospace;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}

  header{
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
    padding:14px 32px;border-bottom:1px solid var(--border);
    position:sticky;top:0;background:var(--bg);z-index:100;
  }
  .logo{font-size:16px;letter-spacing:0.08em;color:var(--text)}
  .badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .psel{display:flex;gap:0;border:1px solid var(--border)}
  .pbtn{font-family:'Courier New',Courier,monospace;font-size:11px;padding:4px 10px;border:none;border-right:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;letter-spacing:0.05em}
  .pbtn:last-child{border-right:none}
  .pbtn.active{background:var(--text);color:var(--bg)}
  .cal-wrap{position:relative}
  .cal-btn{font-family:'Courier New',Courier,monospace;font-size:11px;padding:4px 10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;letter-spacing:0.05em}
  .cal-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
  .cal-popup{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--bg);border:1px solid var(--border);padding:14px;z-index:200;min-width:270px;box-shadow:4px 4px 0 var(--border)}
  .cal-popup.open{display:block}
  .cal-presets{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
  .cpreset{font-family:'Courier New',Courier,monospace;font-size:10px;padding:3px 8px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;letter-spacing:0.04em}
  .cpreset:hover{background:var(--light)}
  .cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .cal-ml{font-size:12px;letter-spacing:0.06em}
  .cnav{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 6px}
  .cnav:hover{color:var(--text)}
  .cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cdow{font-size:9px;color:var(--muted);text-align:center;padding:4px 0;letter-spacing:0.05em}
  .cday{font-size:11px;text-align:center;padding:5px 2px;cursor:pointer;border:none;background:none;color:var(--text);font-family:'Courier New',Courier,monospace}
  .cday:hover{background:var(--light)}
  .cday.today{text-decoration:underline;font-weight:bold}
  .cday.sel{background:var(--text);color:var(--bg)}
  .cday.inr{background:var(--light)}
  .cday.empty{cursor:default;pointer-events:none}
  .cfooter{margin-top:10px;display:flex;gap:6px;align-items:center;border-top:1px solid var(--border);padding-top:10px}
  .cinput{font-family:'Courier New',Courier,monospace;font-size:11px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;flex:1;min-width:0}
  .capply{font-family:'Courier New',Courier,monospace;font-size:11px;padding:4px 12px;border:1px solid var(--text);background:var(--text);color:var(--bg);cursor:pointer;letter-spacing:0.05em}
  .rfbtn{font-size:14px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px;font-family:'Courier New',Courier,monospace}
  .rfbtn:hover{color:var(--text)}

  main{padding:28px 32px;max-width:1200px;margin:0 auto}

  .section-title{font-size:10px;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px}

  .kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--border);margin-bottom:24px}
  .kcard{background:var(--surface);padding:18px 20px;border-right:1px solid var(--border)}
  .kcard:last-child{border-right:none}
  .klbl{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .kval{font-size:26px;color:var(--text);margin-bottom:4px;letter-spacing:-0.01em}
  .ksub{font-size:10px;color:var(--muted)}

  .fcstrip{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--border);border-top:none;margin-bottom:24px;background:var(--light)}
  .fccard{padding:14px 20px;border-right:1px solid var(--border)}
  .fccard:last-child{border-right:none}
  .fclbl{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .fcval{font-size:20px;margin-bottom:4px}
  .fcbar{height:2px;background:var(--border);margin-top:6px}
  .fcfill{height:2px;transition:width 1s ease}

  .crow{display:grid;grid-template-columns:1.4fr 1fr;gap:0;border:1px solid var(--border);border-top:none;margin-bottom:0}
  .ccard{padding:20px;border-right:1px solid var(--border)}
  .ccard:last-child{border-right:none}
  .ctitle{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}

  .barchart{display:flex;align-items:flex-end;gap:3px;height:120px;overflow-x:auto;padding-bottom:4px}
  .bcol{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
  .binn{display:flex;align-items:flex-end;height:95px;width:100%}
  .bar{flex:1;cursor:pointer;transition:opacity .2s;background:var(--text)}
  .bar:hover{opacity:.6}
  .blbl{font-size:8px;color:var(--muted);text-align:center;white-space:nowrap;letter-spacing:0.03em}

  .catlist{display:flex;flex-direction:column}
  .catitem{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
  .catitem:last-child{border-bottom:none}
  .catdash{font-size:11px;color:var(--muted)}
  .catnm{flex:1;font-size:12px}
  .catv{font-size:11px;color:var(--muted)}

  .brow{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);border-top:1px solid var(--border);margin-top:-1px}
  .pitem{display:flex;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border);gap:8px}
  .pitem:last-child{border-bottom:none}
  .prank{font-size:10px;color:var(--muted);width:18px;flex-shrink:0}
  .pname{flex:1;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pca{font-size:12px;color:var(--muted);flex-shrink:0}

  .olist{display:flex;flex-direction:column;max-height:280px;overflow-y:auto}
  .oitem{display:flex;align-items:baseline;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
  .oitem:last-child{border-bottom:none}
  .odate{font-size:10px;color:var(--muted);margin-right:8px}
  .ocat{font-size:10px;color:var(--muted);margin-right:6px;border:1px solid var(--border);padding:1px 4px}
  .oamt{font-size:12px}

  .loading{text-align:center;padding:60px 0;color:var(--muted);font-size:12px;letter-spacing:0.1em}
  .errbox{border:1px solid var(--red);padding:12px 16px;color:var(--red);font-size:11px;margin-bottom:20px}
  .cached-tag{font-size:10px;color:var(--muted);border:1px solid var(--border);padding:1px 6px;letter-spacing:0.05em}

  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .fi{animation:fadeIn .3s ease both}

  .divider{border:none;border-top:1px solid var(--border);margin:24px 0}

  @media(max-width:900px){
    .kgrid,.fcstrip{grid-template-columns:repeat(2,1fr)}
    .kcard,.fccard{border-bottom:1px solid var(--border)}
    .crow,.brow{grid-template-columns:1fr}
    .ccard{border-right:none;border-bottom:1px solid var(--border)}
    header,main{padding:12px 16px}
  }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:14px">
    <div class="logo" id="rname">DASHBOARD</div>
    <div class="badge"><span class="dot"></span><span id="status">connexion...</span></div>
    <span class="cached-tag" id="cache-tag" style="display:none">cache</span>
  </div>
  <div class="controls">
    <div class="psel">
      <button class="pbtn" onclick="preset(1,this)">1J</button>
      <button class="pbtn" onclick="preset(7,this)">7J</button>
      <button class="pbtn active" onclick="preset(30,this)">30J</button>
      <button class="pbtn" onclick="preset(90,this)">3M</button>
    </div>
    <div class="cal-wrap">
      <button class="cal-btn" id="cbtn" onclick="togCal()">CAL. <span id="clbl">PERSO</span></button>
      <div class="cal-popup" id="cpop">
        <div class="cal-presets">
          <button class="cpreset" onclick="qpick('today')">Aujourd'hui</button>
          <button class="cpreset" onclick="qpick('yesterday')">Hier</button>
          <button class="cpreset" onclick="qpick('thisweek')">Cette sem.</button>
          <button class="cpreset" onclick="qpick('lastweek')">Sem. passée</button>
          <button class="cpreset" onclick="qpick('thismonth')">Ce mois</button>
          <button class="cpreset" onclick="qpick('lastmonth')">Mois passé</button>
        </div>
        <div class="cal-hdr">
          <button class="cnav" onclick="ncal(-1)">&#8249;</button>
          <div class="cal-ml" id="cml"></div>
          <button class="cnav" onclick="ncal(1)">&#8250;</button>
        </div>
        <div class="cgrid" id="cgrid"></div>
        <div class="cfooter">
          <input class="cinput" type="date" id="ifrom">
          <span style="color:var(--muted)">—</span>
          <input class="cinput" type="date" id="ito">
          <button class="capply" onclick="applyD()">OK</button>
        </div>
      </div>
    </div>
    <button class="rfbtn" onclick="load(true)" title="Rafraîchir">&#8635;</button>
  </div>
</header>

<main>
  <div id="err" style="display:none" class="errbox"></div>
  <div id="root"><div class="loading">— chargement en cours —</div></div>
</main>

<script>
const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const CATS_COLORS=['#2C2C2A','#888780','#B4B2A9','#5F5E5A','#444441','#D3D1C7'];
let _days=30,_from=null,_to=null,_custom=false;
let _cy=new Date().getFullYear(),_cm=new Date().getMonth();
let _sf=null,_st=null;

function gf(){if(_custom&&_from)return _from;const d=new Date();d.setDate(d.getDate()-_days);return iso(d)}
function gt(){return(_custom&&_to)?_to:iso(new Date())}
function iso(d){return d.toISOString().split('T')[0]}
function lbl(f,t){const s=v=>new Date(v).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});return f===t?s(f):s(f)+' / '+s(t)}

function preset(d,btn){
  _days=d;_custom=false;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('cbtn').classList.remove('active');
  document.getElementById('clbl').textContent='PERSO';
  closeCal();load();
}

function togCal(){document.getElementById('cpop').classList.toggle('open');rcal()}
function closeCal(){document.getElementById('cpop').classList.remove('open')}
document.addEventListener('click',e=>{if(!e.target.closest('.cal-wrap'))closeCal()});
function ncal(d){_cm+=d;if(_cm>11){_cm=0;_cy++}if(_cm<0){_cm=11;_cy--}rcal()}

function rcal(){
  document.getElementById('cml').textContent=MONTHS[_cm].toUpperCase()+' '+_cy;
  const today=iso(new Date());
  let h=['L','M','M','J','V','S','D'].map(d=>`<div class="cdow">${d}</div>`).join('');
  let dow=new Date(_cy,_cm,1).getDay();if(dow===0)dow=7;
  for(let i=1;i<dow;i++)h+=`<button class="cday empty"></button>`;
  const dim=new Date(_cy,_cm+1,0).getDate();
  for(let i=1;i<=dim;i++){
    const ds=`${_cy}-${String(_cm+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    let c='cday';
    if(ds===today)c+=' today';
    if(ds===_sf||ds===_st)c+=' sel';
    else if(_sf&&_st&&ds>_sf&&ds<_st)c+=' inr';
    h+=`<button class="${c}" onclick="pick('${ds}')">${i}</button>`;
  }
  document.getElementById('cgrid').innerHTML=h;
}

function pick(ds){
  if(!_sf||(_sf&&_st)){_sf=ds;_st=null}else if(ds<_sf){_st=_sf;_sf=ds}else _st=ds;
  document.getElementById('ifrom').value=_sf||'';
  document.getElementById('ito').value=_st||'';
  rcal();
  if(_sf&&_st)applyD();
}

function applyD(){
  const f=document.getElementById('ifrom').value||_sf;
  const t=document.getElementById('ito').value||_st||f;
  if(!f)return;
  _from=f;_to=t;_custom=true;_sf=f;_st=t;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('cbtn').classList.add('active');
  document.getElementById('clbl').textContent=lbl(f,t).toUpperCase();
  closeCal();load();
}

function qpick(k){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
  let f,t;
  if(k==='today'){f=t=iso(now)}
  else if(k==='yesterday'){const p=new Date(now);p.setDate(d-1);f=t=iso(p)}
  else if(k==='thisweek'){const s=new Date(now);s.setDate(d-(now.getDay()||7)+1);f=iso(s);t=iso(now)}
  else if(k==='lastweek'){const s=new Date(now);s.setDate(d-(now.getDay()||7)-6);const e=new Date(s);e.setDate(s.getDate()+6);f=iso(s);t=iso(e)}
  else if(k==='thismonth'){f=`${y}-${String(m+1).padStart(2,'0')}-01`;t=iso(now)}
  else if(k==='lastmonth'){const pm=new Date(y,m,0);f=`${pm.getFullYear()}-${String(pm.getMonth()+1).padStart(2,'0')}-01`;t=iso(pm)}
  document.getElementById('ifrom').value=f;document.getElementById('ito').value=t;
  _sf=f;_st=t;rcal();
  _from=f;_to=t;_custom=true;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('cbtn').classList.add('active');
  document.getElementById('clbl').textContent=lbl(f,t).toUpperCase();
  closeCal();load();
}

async function load(force=false){
  document.getElementById('err').style.display='none';
  document.getElementById('root').innerHTML='<div class="loading">— chargement en cours —</div>';
  document.getElementById('status').textContent='connexion...';
  document.getElementById('cache-tag').style.display='none';
  const from=gf(),to=gt();
  try{
    const r=await fetch(`/dashboard?from=${from}&to=${to}`+(force?'&nc=1':''));
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d.meta?.locs?.length)document.getElementById('rname').textContent=d.meta.locs[0].toUpperCase();
    document.getElementById('status').textContent=(d.meta?.locs?.length||0)+' établ.';
    if(d.cached)document.getElementById('cache-tag').style.display='inline';

    const DIV=d.div||1000000000;
    const fmt=n=>(parseInt(n||0)/DIV).toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0});
    const pct=v=>Math.round(v*10)/10+'%';
    const fcc=v=>v<28?'var(--green)':v<35?'var(--amber)':'var(--red)';
    const periodLbl=_custom?lbl(from,to):_days+' derniers jours';
    const caTotal=d.kpis.totalCA||1;
    const fcG=d.kpis.totalAchats>0?(d.kpis.totalAchats/caTotal*100):null;
    const byDay=d.byDay||{};
    const dk=Object.keys(byDay).sort();
    const maxD=Math.max(...dk.map(k=>byDay[k]),1);
    const dlbl=dk.map(v=>new Date(v).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}));
    const barW=Math.max(16,Math.min(36,Math.floor(520/Math.max(dk.length,1))));
    const sortedCats=Object.entries(d.byCat||{}).sort((a,b)=>b[1]-a[1]);
    const topP=d.topProds||[];
    const maxP=topP.length?Math.max(...topP.map(p=>p.ca>0?p.ca:p.qty),1):1;
    const usingQty=d.caByTag?.usingQty;
    const caFood=d.caByTag?.food||0;
    const caBev=(d.caByTag?.bev||0)+(d.caByTag?.spr||0);

    document.getElementById('root').innerHTML=`
      <div class="section-title fi">— résumé · ${periodLbl}</div>

      <div class="kgrid fi">
        <div class="kcard"><div class="klbl">Chiffre d'affaires</div><div class="kval">${fmt(d.kpis.totalCA)}</div><div class="ksub">${periodLbl}</div></div>
        <div class="kcard"><div class="klbl">Commandes</div><div class="kval">${(d.kpis.nbOrders||0).toLocaleString('fr-FR')}</div><div class="ksub">orders POS</div></div>
        <div class="kcard"><div class="klbl">Ticket moyen</div><div class="kval">${fmt(d.kpis.ticket)}</div><div class="ksub">par commande</div></div>
        <div class="kcard"><div class="klbl">Achats matières</div><div class="kval">${fmt(d.kpis.totalAchats)}</div><div class="ksub">BL reçus</div></div>
      </div>

      <div class="fcstrip fi">
        <div class="fccard">
          <div class="fclbl">Food cost global</div>
          ${fcG!==null?`<div class="fcval" style="color:${fcc(fcG)}">${pct(fcG)}</div><div class="fcbar"><div class="fcfill" style="width:${Math.min(fcG,100)}%;background:${fcc(fcG)}"></div></div>`:'<div class="fcval" style="color:var(--muted)">—</div>'}
          <div class="ksub" style="margin-top:5px">achats HT / CA TTC</div>
        </div>
        <div class="fccard">
          <div class="fclbl">CA cuisine</div>
          <div class="fcval">${caFood>0?fmt(caFood):'—'}</div>
          <div class="ksub" style="margin-top:5px">${caFood>0?Math.round(caFood/caTotal*100)+'% du CA':'tags non détectés'}</div>
        </div>
        <div class="fccard">
          <div class="fclbl">CA boissons</div>
          <div class="fcval">${caBev>0?fmt(caBev):'—'}</div>
          <div class="ksub" style="margin-top:5px">${caBev>0?Math.round(caBev/caTotal*100)+'% du CA':'tags non détectés'}</div>
        </div>
        <div class="fccard">
          <div class="fclbl">Pertes & casses</div>
          <div class="fcval" style="color:${d.kpis.totalLosses>0?'var(--red)':'var(--muted)'}">${d.kpis.totalLosses>0?fmt(d.kpis.totalLosses):'—'}</div>
          <div class="ksub" style="margin-top:5px">${d.kpis.totalLosses>0?Math.round(d.kpis.totalLosses/caTotal*100)+'% du CA':'aucune perte saisie'}</div>
        </div>
      </div>

      <div class="crow fi">
        <div class="ccard">
          <div class="ctitle">— CA par jour</div>
          <div class="barchart">
            ${dk.map((k,i)=>`
              <div class="bcol" style="width:${barW}px">
                <div class="binn"><div class="bar" style="height:${Math.round(byDay[k]/maxD*100)}%" title="${dlbl[i]} — ${fmt(byDay[k])}"></div></div>
                <div class="blbl">${dk.length<=20?dlbl[i]:i%Math.ceil(dk.length/8)===0?dlbl[i]:''}</div>
              </div>`).join('')}
          </div>
        </div>
        <div class="ccard">
          <div class="ctitle">— catégories POS</div>
          <div class="catlist">
            ${sortedCats.length===0?'<div style="color:var(--muted);padding:8px 0">aucune catégorie configurée</div>':
              sortedCats.map(([n,v],i)=>`
                <div class="catitem">
                  <span class="catdash" style="color:${CATS_COLORS[i%CATS_COLORS.length]}">■</span>
                  <span class="catnm">${n}</span>
                  <span class="catv">${fmt(v)} · ${Math.round(v/caTotal*100)}%</span>
                </div>`).join('')}
          </div>
        </div>
      </div>

      <div class="brow fi">
        <div class="ccard">
          <div class="ctitle">— top produits · ${usingQty?'par quantité':'par CA'}</div>
          ${topP.length===0?'<div style="color:var(--muted)">aucune donnée article</div>':
            topP.map((p,i)=>`
              <div class="pitem">
                <span class="prank">${String(i+1).padStart(2,'0')}.</span>
                <span class="pname">${p.name||'—'}</span>
                <span class="pca">${usingQty?Math.round(p.qty)+' ventes':fmt(p.ca)}</span>
              </div>`).join('')}
        </div>
        <div class="ccard">
          <div class="ctitle">— dernières commandes</div>
          <div class="olist">
            ${(d.recentOrders||[]).map(o=>`
              <div class="oitem">
                <div><span class="odate">${o.date}</span><span class="ocat">${o.cat}</span><span style="font-size:10px;color:var(--muted)">${o.loc}</span></div>
                <span class="oamt">${fmt(o.amount)}</span>
              </div>`).join('')}
          </div>
        </div>
      </div>
    `;
  }catch(e){
    document.getElementById('err').style.display='block';
    document.getElementById('err').textContent='Erreur : '+e.message;
    document.getElementById('root').innerHTML='';
    document.getElementById('status').textContent='erreur';
  }
}
load();
</script>
</body>
</html>
