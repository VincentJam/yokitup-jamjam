<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamjerk — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #111; --surface2: #1a1a1a; --border: #222;
    --accent: #e8ff47; --accent2: #ff6b35; --accent3: #47c8ff;
    --text: #f0f0f0; --muted: #666; --green: #4ade80; --red: #f87171;
  }
  body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: linear-gradient(rgba(232,255,71,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(232,255,71,.015) 1px,transparent 1px);
    background-size: 40px 40px;
  }
  .app { position: relative; z-index: 1; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(10,10,10,.92); backdrop-filter: blur(12px); z-index: 100;
  }
  .logo { font-size: 18px; font-weight: 800; letter-spacing: -.02em; color: var(--accent); }
  .badge {
    display: flex; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted);
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .period-selector { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 4px; }
  .period-btn { font-family: 'DM Mono', monospace; font-size: 11px; padding: 5px 12px; border-radius: 5px; border: none; background: transparent; color: var(--muted); cursor: pointer; transition: all .2s; }
  .period-btn.active { background: var(--accent); color: #000; font-weight: 700; }

  main { padding: 32px; max-width: 1400px; margin: 0 auto; }

  .kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 32px; }
  .kpi-card { background: var(--surface); padding: 28px 24px; position: relative; overflow: hidden; transition: background .2s; cursor: default; }
  .kpi-card:hover { background: var(--surface2); }
  .kpi-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--accent); transform: scaleX(0); transition: transform .3s; transform-origin: left; }
  .kpi-card:hover::after { transform: scaleX(1); }
  .kpi-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .kpi-value { font-size: 32px; font-weight: 800; line-height: 1; margin-bottom: 8px; letter-spacing: -.02em; }
  .kpi-sub { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

  .charts-row { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; margin-bottom: 16px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .card-title { font-size: 13px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
  .card-title span { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0; }

  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 150px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; }
  .bar-inner { display: flex; align-items: flex-end; gap: 2px; height: 120px; width: 100%; }
  .bar { flex: 1; border-radius: 4px 4px 0 0; transition: opacity .2s; cursor: pointer; }
  .bar:hover { opacity: .75; }
  .bar-lbl { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); text-align: center; }

  .cat-list { display: flex; flex-direction: column; gap: 0; }
  .cat-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .cat-item:last-child { border-bottom: none; }
  .cat-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .cat-name { flex: 1; }
  .cat-val { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

  .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .prod-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 10px; font-size: 13px; }
  .prod-item:last-child { border-bottom: none; }
  .prod-rank { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); width: 20px; flex-shrink: 0; }
  .prod-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .prod-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
  .prod-ca { font-family: 'DM Mono', monospace; font-size: 12px; }
  .prod-bar-wrap { width: 60px; height: 2px; background: var(--border); border-radius: 1px; }
  .prod-bar-fill { height: 2px; background: var(--accent); border-radius: 1px; transition: width .8s ease; }

  .orders-list { display: flex; flex-direction: column; max-height: 260px; overflow-y: auto; }
  .order-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .order-item:last-child { border-bottom: none; }
  .order-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-right: 8px; }
  .order-cat { font-size: 10px; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); color: var(--muted); margin-right: 8px; }
  .order-amount { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); }

  .loading { text-align: center; padding: 60px 0; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 13px; }
  .error { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3); border-radius: 8px; padding: 16px; color: var(--red); font-family: 'DM Mono', monospace; font-size: 12px; margin-bottom: 24px; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .fadein { animation: fadeUp .4s ease both; }

  @media(max-width:900px) {
    .kpi-grid { grid-template-columns: repeat(2,1fr); }
    .charts-row, .bottom-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo" id="resto-name">Dashboard</div>
  <div class="badge"><span class="dot"></span><span id="status">Connexion...</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="period-selector">
      <button class="period-btn" onclick="setPeriod(7,this)">7j</button>
      <button class="period-btn active" onclick="setPeriod(30,this)">30j</button>
      <button class="period-btn" onclick="setPeriod(90,this)">3m</button>
    </div>
    <button onclick="loadAll()" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline">↺ Refresh</button>
  </div>
</header>

<main>
  <div id="error" style="display:none" class="error"></div>
  <div id="root"><div class="loading">Chargement des données...</div></div>
</main>
</div>

<script>
let days = 30;
const CAT_COLORS = ['#e8ff47','#47c8ff','#ff6b35','#a78bfa','#4ade80','#f472b6'];

function setPeriod(d, btn) {
  days = d;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadAll();
}

function dateFrom() {
  const d = new Date(); d.setDate(d.getDate() - days);
  return d.toISOString().split('T')[0];
}
function dateTo() { return new Date().toISOString().split('T')[0]; }

async function apiFetch(path, params = '') {
  const sep = params ? '?' : '';
  const url = `/api${path}${sep}${params}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function fetchPaged(path, extraParams = '') {
  const dateParams = `date_from=${dateFrom()}&date_to=${dateTo()}`;
  const params = extraParams ? dateParams + '&' + extraParams : dateParams;
  let results = [], nextUrl = null;
  let data = await apiFetch(path, params);
  results = results.concat(data.data || []);
  nextUrl = data.links?.next;
  while (nextUrl && nextUrl !== 'null') {
    const r = await fetch(nextUrl.replace('https://api.yokitup.com', '/api'));
    if (!r.ok) break;
    data = await r.json();
    results = results.concat(data.data || []);
    nextUrl = data.links?.next;
  }
  return results;
}

function fmt(nano) {
  return (parseInt(nano || 0) / 1000000000).toLocaleString('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
}

function groupByDay(orders) {
  const map = {};
  orders.forEach(o => {
    map[o.date] = (map[o.date] || 0) + parseInt(o.amount_including_tax || 0);
  });
  return map;
}

async function loadAll() {
  document.getElementById('error').style.display = 'none';
  document.getElementById('root').innerHTML = '<div class="loading">Chargement des données...</div>';
  document.getElementById('status').textContent = 'Connexion...';

  try {
    const [locData, catData] = await Promise.all([
      apiFetch('/locations'),
      apiFetch('/pos_categories')
    ]);

    const locs = locData.data || [];
    const cats = catData.data || [];
    const catMap = {}; cats.forEach(c => catMap[c.id] = c.name);
    const locMap = {}; locs.forEach(l => locMap[l.id] = l.name);

    if (locs.length > 0) document.getElementById('resto-name').textContent = locs[0].name;
    document.getElementById('status').textContent = locs.length + ' établissement' + (locs.length > 1 ? 's' : '');

    const [orders, products] = await Promise.all([
      fetchPaged('/pos_orders'),
      apiFetch('/products').then(r => r.data || [])
    ]);

    const prodMap = {}; products.forEach(p => prodMap[p.id] = p.name);

    let orderItems = [];
    try { orderItems = await fetchPaged('/pos_order_items'); } catch(e) {}

    const totalCA = orders.reduce((s, o) => s + parseInt(o.amount_including_tax || 0), 0);
    const nbOrders = orders.length;
    const ticketMoyen = nbOrders > 0 ? Math.round(totalCA / nbOrders) : 0;

    const byCat = {};
    orders.forEach(o => {
      const k = catMap[o.pos_category_id] || 'Autre';
      byCat[k] = (byCat[k] || 0) + parseInt(o.amount_including_tax || 0);
    });

    const prodSales = {};
    orderItems.forEach(i => {
      if (!prodSales[i.product_id]) prodSales[i.product_id] = { qty: 0, ca: 0 };
      prodSales[i.product_id].qty += parseFloat(i.quantity || 0);
      prodSales[i.product_id].ca += parseInt(i.amount_including_tax || 0);
    });

    const topProds = Object.entries(prodSales).sort((a,b) => b[1].ca - a[1].ca).slice(0, 8);
    const maxProd = topProds.length > 0 ? topProds[0][1].ca : 1;

    const byDay = groupByDay(orders);
    const dayKeys = Object.keys(byDay).sort().slice(-14);
    const maxDay = Math.max(...dayKeys.map(k => byDay[k]), 1);

    const sortedCats = Object.entries(byCat).sort((a,b) => b[1]-a[1]);
    const recentOrders = [...orders].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 20);

    const dayLabels = dayKeys.map(d => {
      const dt = new Date(d);
      return dt.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
    });

    document.getElementById('root').innerHTML = `
      <div class="kpi-grid fadein">
        <div class="kpi-card">
          <div class="kpi-label">Chiffre d'affaires</div>
          <div class="kpi-value" style="color:var(--accent)">${fmt(totalCA)}</div>
          <div class="kpi-sub">${days} derniers jours</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Commandes</div>
          <div class="kpi-value">${nbOrders.toLocaleString('fr-FR')}</div>
          <div class="kpi-sub">orders POS</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Ticket moyen</div>
          <div class="kpi-value">${fmt(ticketMoyen)}</div>
          <div class="kpi-sub">par commande</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Établissements</div>
          <div class="kpi-value" style="color:var(--accent3)">${locs.length}</div>
          <div class="kpi-sub">${locs.map(l=>l.name).join(', ')}</div>
        </div>
      </div>

      <div class="charts-row fadein">
        <div class="chart-card">
          <div class="card-title">CA par jour <span>14 derniers jours</span></div>
          <div class="bar-chart">
            ${dayKeys.map((k, i) => `
              <div class="bar-col">
                <div class="bar-inner">
                  <div class="bar" style="height:${Math.round(byDay[k]/maxDay*100)}%;background:var(--accent);opacity:.85" title="${dayLabels[i]} — ${fmt(byDay[k])}"></div>
                </div>
                <div class="bar-lbl">${dayLabels[i]}</div>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="chart-card">
          <div class="card-title">Catégories POS</div>
          <div class="cat-list">
            ${sortedCats.length === 0
              ? '<div style="color:var(--muted);font-size:13px;padding:12px 0">Aucune catégorie</div>'
              : sortedCats.map(([name, val], i) => `
                <div class="cat-item">
                  <span class="cat-dot" style="background:${CAT_COLORS[i%CAT_COLORS.length]}"></span>
                  <span class="cat-name">${name}</span>
                  <span class="cat-val">${fmt(val)} · ${Math.round(val/totalCA*100)}%</span>
                </div>
              `).join('')
            }
          </div>
        </div>
      </div>

      <div class="bottom-row fadein">
        <div class="chart-card">
          <div class="card-title">Top produits <span>par CA</span></div>
          ${topProds.length === 0
            ? '<div style="color:var(--muted);font-size:13px">Pas de données articles disponibles</div>'
            : topProds.map(([pid, d], i) => `
              <div class="prod-item">
                <span class="prod-rank">#${i+1}</span>
                <span class="prod-name">${prodMap[pid] || pid.slice(0,12)+'…'}</span>
                <div class="prod-right">
                  <span class="prod-ca">${fmt(d.ca)}</span>
                  <div class="prod-bar-wrap"><div class="prod-bar-fill" style="width:${Math.round(d.ca/maxProd*100)}%"></div></div>
                </div>
              </div>
            `).join('')
          }
        </div>

        <div class="chart-card">
          <div class="card-title">Dernières commandes</div>
          <div class="orders-list">
            ${recentOrders.map(o => `
              <div class="order-item">
                <div>
                  <span class="order-date">${o.date}</span>
                  <span class="order-cat">${catMap[o.pos_category_id] || '—'}</span>
                  <span style="font-size:12px;color:var(--muted)">${locMap[o.location_id] || ''}</span>
                </div>
                <span class="order-amount">${fmt(o.amount_including_tax)}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;

  } catch(err) {
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'Erreur : ' + err.message;
    document.getElementById('root').innerHTML = '';
    document.getElementById('status').textContent = 'Erreur';
  }
}

loadAll();
</script>
</body>
</html>
